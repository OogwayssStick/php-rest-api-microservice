<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <title>Ürün Yönetimi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

</head>

<body>

    <div class="d-flex">

        <div id="sidebar"></div>

        <div class="content">

            <div id="navbar"></div>

            <div class="card shadow mb-4">

                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        Ürün Ekle / Güncelle

                    </h4>

                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6">

                            <input id="product_name" class="form-control mb-3" placeholder="Ürün Adı">

                            <textarea id="description" class="form-control mb-3" placeholder="Açıklama"></textarea>

                            <input type="number" id="price" class="form-control mb-3" placeholder="Fiyat">

                            <select id="discount" class="form-select mb-3">

                                <option>Yok</option>
                                <option>Var</option>

                            </select>

                            <select id="sale_status" class="form-select mb-3">

                                <option>Satışta</option>
                                <option>Satışta Değil</option>

                            </select>

                            <!-- ÜRÜN RESMİ -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Ürün Resmi

                                </label>

                                <input type="file" id="image" class="form-control" accept=".jpg,.jpeg,.png">

                            </div>

                            <button id="addProduct" class="btn btn-primary">

                                Ürün Ekle

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <div class="card shadow">

                <div class="card-header bg-dark text-white">

                    <h4 class="mb-0">

                        Ürün Listesi

                    </h4>

                </div>

                <div class="card-body">

                    <table id="productsTable" class="table table-striped table-hover">

                        <thead class="table-dark">

                            <tr>

                                <th>Fotoğraf</th>
                                <th>ID</th>
                                <th>Ürün</th>
                                <th>Açıklama</th>
                                <th>Fiyat</th>
                                <th>İndirim</th>
                                <th>Durum</th>
                                <th>İşlemler</th>

                            </tr>

                        </thead>

                        <tbody id="productTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/common.js"></script>

    <script src="js/products.js"></script>

</body>

</html>
