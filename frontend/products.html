<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Ürün Yönetimi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>


</head>

<body>
    <div class="container mt-5">

        <h2 class="mb-4">

            Ürün Yönetim Paneli
            <button id="logoutBtn" class="btn btn-danger">
                Çıkış Yap
            </button>
        </h2>

        <div class="row">

            <div class="col-md-6">

                <input id="product_name" class="form-control mb-3" placeholder="Ürün Adı">

                <textarea id="description" class="form-control mb-3" placeholder="Açıklama"></textarea>

                <input type="number" id="price" class="form-control mb-3" placeholder="Fiyat">

                <select id="discount" class="form-control mb-3">

                    <option>Yok</option>

                    <option>Var</option>

                </select>

                <select id="sale_status" class="form-control mb-3">

                    <option>Satışta</option>

                    <option>Satışta Değil</option>

                </select>

                <button id="addProduct" class="btn btn-primary">

                    Ürün Ekle

                </button>

            </div>

        </div>

        <hr>



        <table id="productsTable" class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Ürün</th>
                    <th>Açıklama</th>
                    <th>Fiyat</th>
                    <th>İndirim</th>
                    <th>Durum</th>
                    <th>İşlemler</th>

                </tr>

            </thead>

            <tbody id="productTable">

            </tbody>

        </table>

    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/products.js?v=1.1"></script>

</body>

</html>
