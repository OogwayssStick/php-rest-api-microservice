<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="css/style.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <div class="d-flex">

        <div id="sidebar"></div>

        <div class="content">

            <div id="navbar"></div>

            <div class="row">

                <div class="col-lg-5">

                    <div class="card shadow">

                        <div class="card-header bg-primary text-white">

                            <h4 class="mb-0">

                                Profil Bilgileri

                            </h4>

                        </div>

                        <div class="card-body">

                            <p>

                                <strong>ID :</strong>

                                <span id="userId"></span>

                            </p>

                            <p>

                                <strong>Kullanıcı :</strong>

                                <span id="usernameProfile"></span>

                            </p>

                        </div>

                    </div>

                </div>

                <div class="col-lg-7">

                    <div class="card shadow">

                        <div class="card-header bg-success text-white">

                            <h4 class="mb-0">

                                Şifre Değiştir

                            </h4>

                        </div>

                        <div class="card-body">

                            <input type="password" id="oldPassword" class="form-control mb-3" placeholder="Eski Şifre">

                            <input type="password" id="newPassword" class="form-control mb-3" placeholder="Yeni Şifre">

                            <input type="password" id="newPassword2" class="form-control mb-3"
                                placeholder="Yeni Şifre Tekrar">

                            <button id="changePassword" class="btn btn-success">

                                Şifreyi Güncelle

                            </button>

                        </div>

                    </div>

                </div>
                <div class="card shadow mt-4">

                    <div class="card-body text-center">

                        <img id="profileImage" src="../uploads/users/default.jpg" class="rounded-circle border mb-3"
                            width="180" height="180">

                        <br>

                        <input type="file" id="imageFile" class="form-control mb-3" accept=".jpg,.jpeg,.png">

                        <button class="btn btn-primary" id="uploadImage">

                            Fotoğrafı Güncelle

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
</body>

</html>
