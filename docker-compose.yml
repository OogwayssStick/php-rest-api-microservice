version: "3.9"

services:

  web:
    build: .
    container_name: php_api

    ports:
      - "8080:80"

    volumes:
      - ./:/var/www/html

    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_api

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: microservice_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: 123456

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_api

    restart: always

    ports:
      - "8081:80"

    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - db

volumes:
  mysql_data:
