name: Docker Build Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Repository kodunu indir
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Image Build
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:${{ github.sha }} \
            .

      - name: Docker Hub Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: AWS EC2 Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ubuntu/php-api

            export IMAGE_TAG=${{ github.sha }}

            chmod +x scripts/deploy.sh

            ./scripts/deploy.sh
