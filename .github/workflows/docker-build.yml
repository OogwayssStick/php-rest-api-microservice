name: Docker Build Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Repository kodunu indir
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Image Build
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:${{ github.sha }} \
            .

      - name: Docker Hub Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/php-rest-api-microservice:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: AWS EC2 Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/php-api

            echo "========== DEPLOY BAŞLADI =========="

            # Şu an çalışan image'ın tag'ini al
            OLD_TAG=$(docker inspect --format='{{.Config.Image}}' php_api_prod | cut -d':' -f2)

            echo "Eski Tag : $OLD_TAG"

            # Yeni commit tag'i
            export IMAGE_TAG=${{ github.sha }}

            echo "Yeni Tag : $IMAGE_TAG"

            # Yeni image'ı indir
            docker compose -f docker-compose.prod.yml pull web

            # Yeni image ile ayağa kaldır
            docker compose -f docker-compose.prod.yml up -d --force-recreate web

            # 30 kez health kontrolü yap
            for i in {1..30}
            do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' php_api_prod)

              echo "Deneme $i -> $STATUS"

              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Deployment başarılı."

                docker image prune -f

                exit 0
              fi

              sleep 2
            done

            echo "❌ Deployment başarısız."

            echo "Rollback başlatılıyor..."

            export IMAGE_TAG=$OLD_TAG

            docker compose -f docker-compose.prod.yml up -d --force-recreate web

            docker image prune -f

            exit 1
